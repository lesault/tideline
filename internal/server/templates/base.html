{{define "base"}}<!doctype html>
<html lang="en"{{if .Theme}} data-theme="{{.Theme}}"{{end}}>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{block "title" .}}Tideline{{end}}</title>
  <script>
    // Before paint: if the server didn't pin a theme (user follows the OS),
    // pick Deep Tide in dark mode, else Foam & Shore — avoids a flash.
    (function () {
      var el = document.documentElement;
      if (!el.getAttribute("data-theme")) {
        var dark = window.matchMedia && window.matchMedia("(prefers-color-scheme: dark)").matches;
        el.setAttribute("data-theme", dark ? "deep" : "foam");
      }
    })();
  </script>
  <script src="/static/htmx.min.js" defer></script>
  <link rel="stylesheet" href="/static/app.css">
</head>
<body>
  <header class="topbar">
    <a class="brand" href="/inbox">🌊 Tideline</a>
    {{if .UserEmail}}
      <nav>
        <a href="/inbox">Inbox</a>
        <a href="/board">Board</a>
        <a href="/reef">Reef</a>
        <a href="/flotsam">Flotsam</a>
        <a href="/settings">Settings</a>
        <span class="who">{{.UserEmail}}</span>
        <form method="post" action="/logout" class="inline"><button class="link">Log out</button></form>
      </nav>
    {{end}}
  </header>
  <main>
    {{block "content" .}}{{end}}
  </main>
  <div id="toast"></div>
</body>
</html>{{end}}
