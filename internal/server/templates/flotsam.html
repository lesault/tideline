{{define "title"}}Flotsam · Tideline{{end}}
{{define "content"}}
<section class="inbox">
  <h1>Flotsam <span class="count">{{len .Links}}</span></h1>
  <p class="empty">Links that expired before you acted on them. Kept, not deleted — but out of your way.</p>
  <ul class="links">
    {{range .Links}}
      <li class="link expired">
        <a class="title" href="{{.URL}}" target="_blank" rel="noopener">{{if .Title}}{{.Title}}{{else}}{{.URL}}{{end}}</a>
        <span class="domain">{{.Domain}}</span>
        <form method="post" action="/links/{{.ID}}/restore" class="inline restore">
          <input type="hidden" name="status" value="inbox">
          <button class="mini">Restore to inbox</button>
        </form>
      </li>
    {{end}}
  </ul>
</section>
{{end}}
