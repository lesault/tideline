{{define "title"}}Board · Tideline{{end}}
{{define "content"}}
<section class="board">
  <h1>Board</h1>
  <p class="hint">Drag cards between columns to move them along.</p>
  <div class="columns">
    {{range .Columns}}
      <div class="column" data-column="{{.Name}}">
        <h2>{{.Name}} <span id="count-{{.Name}}" class="count">{{len .Cards}}</span></h2>
        <ul class="cards" data-column="{{.Name}}">
          {{range .Cards}}{{template "board_card" .}}{{end}}
        </ul>
      </div>
    {{end}}
  </div>
</section>
<script src="/static/board.js" defer></script>
{{end}}
